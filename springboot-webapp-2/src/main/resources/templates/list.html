<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${title}">Title</title>
</head>
<body>
    <h1 th:text="${title}">Title</h1>
    <!-- Condicional -->
    <div th:if="${users.isEmpty()}" th:text="${'No tiene elementos usuarios!'}"></div>
    <!-- For each -->
    <table th:if="${not (users.isEmpty())}">
        <thead>
            <tr>
                <th>Name</th>
                <th>Last Name</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
        <!-- Hacemos el for each -->
            <tr th:each="user: ${users}">
                <td th:text="${user.name}"></td>
                <td th:text="${user.lastname}"></td>
                <!-- Si hay email -->
                <td th:if="${user.email}" th:text="${user.email}"></td>
                <!-- Si no hay email -->
                <td th:if="${not (user.email != null)}" th:text="${' - '}"></td>
            </tr>
        </tbody>
    </table>
</body>
</html>
